name: Build Installer

# タグ push 時（リリース時）と手動実行
on:
  push:
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build_installer.yaml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write # リリース作成のために必要

jobs:
  build-installer:
    name: Build Installer
    runs-on: windows-latest
    steps:

      # リポジトリをチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # Go をセットアップ
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      # インストーラーをビルド
      - name: Build Installer
        run: |
          cd installer
          go build -o bin/ main.go

      # ビルド成功を確認
      - name: Verify Build
        run: |
          if (Test-Path "installer/bin/main.exe") {
            Write-Host "✓ Installer built successfully"
            Get-Item "installer/bin/main.exe" | ForEach-Object { Write-Host "Size: $([Math]::Round($_.Length / 1MB, 2)) MB" }
          } else {
            Write-Host "✗ Installer build failed"
            exit 1
          }

      # アーティファクトとしてアップロード
      - name: Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: bin/main.exe
          retention-days: 7

  # リリース作成とファイルアップロード（タグ push 時のみ）
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/')
    steps:

      # アーティファクトをダウンロード
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: .

      # インストーラーをリネーム（バージョン情報を含める）
      - name: Rename Installer
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv main.exe "jikkyo.exe"
          ls -lh *.exe

      # インストーラーを GitHub Release にアップロード
      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v1
        with:
          files: jikkyo.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Release Created
        run: |
          echo "::notice title=Release Created::jikkyo installer has been uploaded to GitHub Release"